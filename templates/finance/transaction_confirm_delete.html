{% extends 'base.html' %}

{% block title %}Delete Transaction | MoneyMind{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card">
            <h1 class="page-title mb-2">Delete transaction</h1>
            <p class="text-muted">This will permanently remove <strong>{{ object.title }}</strong> from your records.</p>
            <form method="post">
                {% csrf_token %}
                <button class="btn btn-danger" type="submit">Delete</button>
                <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
